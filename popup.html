<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 420px;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* On/off toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #7f8c8d;
      border-radius: 24px;
      transition: 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    .switch input:checked + .slider {
      background: #27ae60;
    }

    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }

    .container {
      padding: 16px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 13px;
    }

    /* JSON / List view switcher */
    .view-switch {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      width: fit-content;
    }

    .view-switch button {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: white;
      color: #666;
      cursor: pointer;
    }

    .view-switch button.active {
      background: #2c3e50;
      color: white;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      min-height: 160px;
      resize: vertical;
      margin-bottom: 12px;
    }

    /* List view */
    .header-list {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 12px;
      max-height: 240px;
      overflow-y: auto;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
    }

    .header-row:last-child {
      border-bottom: none;
    }

    .header-row input[type="checkbox"] {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .header-row-info {
      flex: 1;
      min-width: 0;
    }

    .header-row-name {
      font-weight: 600;
      font-size: 13px;
      color: #2c3e50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-row-value {
      font-size: 12px;
      color: #7f8c8d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-row.off .header-row-info {
      opacity: 0.4;
    }

    .row-btn {
      padding: 4px 8px;
      font-size: 12px;
      flex-shrink: 0;
    }

    .row-btn.edit {
      background: #3498db;
    }

    .row-btn.edit:hover {
      background: #2980b9;
    }

    .row-btn.save {
      background: #27ae60;
    }

    .row-btn.save:hover {
      background: #229954;
    }

    .row-btn.cancel {
      background: #7f8c8d;
    }

    .row-btn.cancel:hover {
      background: #6c7a7f;
    }

    .header-row.editing {
      align-items: flex-start;
    }

    .header-row-edit {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-row-edit input {
      padding: 6px 8px;
      font-size: 12px;
    }

    .empty-list {
      padding: 12px;
      color: #999;
      font-size: 12px;
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      background: white;
    }

    textarea:focus,
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1);
    }

    button {
      padding: 10px 12px;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }

    button.primary {
      width: 100%;
      background: #27ae60;
    }

    button.primary:hover {
      background: #229954;
    }

    button.secondary {
      background: #3498db;
    }

    button.secondary:hover {
      background: #2980b9;
    }

    button.delete {
      background: #e74c3c;
    }

    button.delete:hover {
      background: #c0392b;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row select,
    .row input {
      flex: 1;
      min-width: 0;
    }

    .row button {
      flex-shrink: 0;
    }

    .status {
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>HeaderX</span>
    <label class="switch" title="Turn header injection on/off">
      <input type="checkbox" id="enabledToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="container">
    <div id="status" class="status"></div>

    <label>Headers — applied to all URLs while turned on:</label>

    <div class="view-switch">
      <button id="viewJsonBtn" class="active">JSON</button>
      <button id="viewListBtn">List</button>
    </div>

    <textarea
      id="jsonBox"
      spellcheck="false"
      placeholder='[{"name": "X-Custom-Header", "value": "value"}]
or
{"X-Custom-Header": "value", "Authorization": "Bearer token"}'
    ></textarea>

    <div class="header-list" id="headerList" style="display: none;"></div>

    <button class="primary" id="saveBtn">Save & Apply</button>

    <div class="divider"></div>

    <label>Profiles:</label>
    <div class="row">
      <input type="text" id="profileCombo" list="profileOptions" placeholder="Profile name" autocomplete="off">
      <button class="secondary" id="loadProfileBtn">Load</button>
      <button class="delete" id="deleteProfileBtn">Delete</button>
    </div>
    <datalist id="profileOptions"></datalist>
  </div>

  <script src="popup.js"></script>
</body>
</html>
